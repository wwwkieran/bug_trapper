<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 900" width="384" height="900">
  <!-- Background -->
  <rect x="0" y="0" width="384" height="900" fill="white"/>

  <!-- Top divider -->
  <rect x="8" y="20" width="368" height="4" fill="black"/>

  <!-- Banner -->
  <text x="192" y="64" text-anchor="middle" font-family="monospace" font-size="28" font-weight="bold" fill="black">BUG TRAPPER</text>

  <!-- Divider under banner -->
  <rect x="8" y="84" width="368" height="2" fill="black"/>

  <!-- Organism name (large) -->
  <text x="192" y="140" text-anchor="middle" font-family="monospace" font-size="32" font-weight="bold" fill="black">{{name}}</text>

  <!-- Description: data-wrap=N wraps to N chars per line; data-line-height
       sets row spacing in SVG units. -->
  <text x="16" y="180" font-family="monospace" font-size="14" fill="black"
        data-wrap="36" data-line-height="20">{{description}}</text>

  <!-- Illustration slot: 384×384, full width, ~1.9" tall on the printer -->
  <rect id="illustration" x="0" y="220" width="384" height="384" fill="white" stroke="black" stroke-width="1"/>

  <!-- Sighting count -->
  <text x="192" y="640" text-anchor="middle" font-family="monospace" font-size="16" fill="black">Sighting #{{count}}</text>

  <!-- Timestamp -->
  <text x="192" y="668" text-anchor="middle" font-family="monospace" font-size="14" fill="black">{{timestamp}}</text>

  <!-- Bottom divider -->
  <rect x="8" y="700" width="368" height="4" fill="black"/>

  <!-- Footer -->
  <text x="192" y="740" text-anchor="middle" font-family="monospace" font-size="14" fill="black">thank you for trapping</text>
</svg>
